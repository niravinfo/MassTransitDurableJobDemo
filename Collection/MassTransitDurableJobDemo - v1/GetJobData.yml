info:
  name: GetJobData
  type: http
  seq: 3
  tags:
    - MassTransitDurableJobDemo

http:
  method: GET
  url: "{{baseUrl}}/api/reports/:jobId/data"
  params:
    - name: jobId
      value: "{{JobId}}"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/reports/:jobId/data"
      method: GET
      params:
        - name: jobId
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "jobId": "",
            "job": {},
            "jobState": "",
            "submitted": "",
            "started": "",
            "completed": "",
            "faulted": "",
            "reason": "",
            "retryAttempt": ""
          }
  - name: 404 Response
    description: Not Found
    request:
      url: "{{baseUrl}}/api/reports/:jobId/data"
      method: GET
      params:
        - name: jobId
          value: ""
          type: path
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
