info:
  name: BulkSubmitReports
  type: http
  seq: 2
  tags:
    - MassTransitDurableJobDemo

http:
  method: POST
  url: "{{baseUrl}}/api/reports/bulk"
  body:
    type: json
    data: |-
      {
        "count": "1"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/reports/bulk"
      method: POST
      body:
        type: json
        data: |-
          {
            "count": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "totalSubmitted": "",
            "submittedAt": "",
            "jobs": [
              {
                "jobId": "",
                "reportId": "",
                "reportName": "",
                "reportType": ""
              }
            ]
          }
